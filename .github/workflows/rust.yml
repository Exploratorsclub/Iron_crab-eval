# PR-/Main-Gate für ironcrab-eval: schnelle, API-unabhängige Qualitätschecks.
# Die eigentlichen Invarianten-/Blackbox-Tests laufen in Iron_crab CI (Eval Level 5)
# gegen den jeweiligen Impl-Stand; hier nur fmt + check + build + clippy ohne Test-Ziele,
# damit Eval-PRs (z. B. Test-Anpassungen) nicht gegen einen festen architecture-rebuild
# blockieren.
name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ironcrab-eval
        uses: actions/checkout@v4
        with:
          path: ironcrab-eval

      - name: Checkout Iron_crab
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/Iron_crab
          path: Iron_crab

      - name: Patch git-dep to use sibling checkout
        run: |
          cat >> ironcrab-eval/Cargo.toml <<'EOF'

          [patch."https://github.com/Exploratorsclub/Iron_crab.git"]
          ironcrab = { path = "../Iron_crab" }
          EOF

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format check
        run: cargo fmt -p ironcrab-eval -- --check
        working-directory: ironcrab-eval

      - name: Check
        run: cargo check --verbose
        working-directory: ironcrab-eval

      - name: Build
        run: cargo build --verbose
        working-directory: ironcrab-eval

      # Kein --all-targets: sonst werden Integrationstests (tests/*.rs) kompiliert und
      # an die öffentliche ironcrab-API gekoppelt (Workflow-Deadlock mit parallelen Impl/Eval-PRs).
      - name: Clippy
        run: cargo clippy -p ironcrab-eval -- -D warnings
        working-directory: ironcrab-eval
